<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KBFC | Check Order</title>
<link rel="icon" type="image/png" href="/images/Favicon.png">
<link rel="apple-touch-icon" href="/images/Favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAFAF8;
    --surface:#FFFFFF;
    --ink:#14171C;
    --muted:#6B7280;
    --accent:#b91321;
    --line: rgba(20,23,28,0.12);
    --line-soft: rgba(20,23,28,0.06);
    --shadow: 0 20px 60px rgba(20,23,28,0.10);
  }
  html[data-theme="dark"]{
    --bg:#0D0F12;
    --surface:#15181D;
    --ink:#F2F1EC;
    --muted:#9CA3AF;
    --accent:#b91321;
    --line: rgba(242,241,236,0.14);
    --line-soft: rgba(242,241,236,0.07);
    --shadow: 0 20px 60px rgba(0,0,0,0.45);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
    transition:background .35s ease, color .35s ease;
  }
  .mono{font-family:'JetBrains Mono',monospace; letter-spacing:0.06em;}

  /* ---------- topbar (matches index.html) ---------- */
  .topbar{
    position:fixed; top:0; left:0; right:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 32px;
    background:var(--bg);
    border-bottom:1px solid var(--line);
    color:var(--ink);
    transition:background .35s ease, border-color .35s ease;
  }
  .brand-wrap{ display:flex; flex-direction:column; gap:6px; }
  .brand{
    cursor:pointer; display:flex; align-items:center; gap:10px;
    font-size:14px; font-weight:600; letter-spacing:0.08em;
  }
  .brand:hover{ opacity:.85; }
  .brand-logo{ width:24px; height:24px; object-fit:contain; }
  .brand span{font-family:'JetBrains Mono',monospace;}

  .theme-toggle{
    width:40px;height:40px;border-radius:50%;
    border:1px solid var(--line);
    background:transparent;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    color:var(--ink);
  }
  .theme-toggle svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.6;}
  .theme-toggle .moon{display:none;}
  html[data-theme="dark"] .theme-toggle .sun{display:none;}
  html[data-theme="dark"] .theme-toggle .moon{display:block;}

  /* ---------- hamburger drawer (matches index.html) ---------- */
  .topbar-actions{display:flex; align-items:center; gap:14px; position:relative;}
  .menu-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.45);
    opacity:0; pointer-events:none;
    transition:opacity .3s ease;
    z-index:1000;
  }
  .menu-overlay.active{ opacity:1; pointer-events:auto; }
  .topbar-menu{
    position:fixed; top:0; right:0; bottom:0;
    width:320px; max-width:82vw;
    background:var(--surface); border-left:1px solid var(--line);
    display:flex; flex-direction:column;
    padding:22px 22px 28px;
    transform:translateX(100%);
    transition:transform .32s ease;
    z-index:1001;
    overflow-y:auto;
  }
  .topbar-menu.active{ transform:translateX(0); }
  .topbar-menu-head{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:18px; padding-bottom:16px;
    border-bottom:1px solid var(--line);
  }
  .topbar-menu-head span{
    font-family:'Oswald',sans-serif; font-weight:600; font-size:14px;
    letter-spacing:.04em; text-transform:uppercase; color:var(--muted);
  }
  .menu-close-btn{
    width:34px; height:34px; border-radius:50%; border:1px solid var(--line);
    background:transparent; color:var(--ink); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .menu-close-btn svg{ width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2; }
  .btn-mini{
    display:inline-flex; align-items:center; gap:8px;
    border:1px solid var(--line);
    background:transparent; color:var(--ink);
    padding:9px 16px; border-radius:999px;
    font-family:'Inter',sans-serif; font-size:12.5px; font-weight:600;
    letter-spacing:0.01em; cursor:pointer;
    transition:transform .2s ease, border-color .25s ease;
    outline:none; text-decoration:none;
  }
  .btn-mini:hover{transform:translateY(-1px); border-color:var(--accent);}
  .btn-mini:focus-visible{ border-color:var(--accent); }
  .btn-mini svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.4;}
  .topbar-menu .btn-mini{
    width:100%; justify-content:flex-start; gap:12px;
    font-size:14px !important; padding:16px 4px;
    border:none; border-radius:0;
    border-bottom:1px solid var(--line);
  }
  .topbar-menu .btn-mini svg{ width:16px; height:16px; }
  .menu-group-label{
    font-size:10.5px; font-weight:700; letter-spacing:.08em;
    color:var(--accent); text-transform:uppercase;
    padding:16px 4px 6px;
  }
  .topbar-menu .menu-group-label:first-of-type{ padding-top:4px; }
  .topbar-menu .btn-mini:disabled{
    cursor:not-allowed; opacity:.5;
  }
  .menu-item-soon{ font-size:10px; opacity:.8; margin-left:2px; }
  .btn-mini.menu-toggle-btn{
    display:flex; width:40px; height:40px; padding:0;
    align-items:center; justify-content:center; border-radius:50%;
  }
  .menu-toggle-btn svg{ width:16px; height:16px; }

  .back-link{
    display:inline-flex; align-items:center; gap:8px;
    font-size:13px; color:var(--muted); cursor:pointer;
    margin-bottom:24px; background:none; border:none; padding:0;
    font-family:'Inter',sans-serif;
  }
  .back-link:hover{ color:var(--ink); }
  .back-link svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}

  .wrap{
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:110px 6vw 60px;
  }
  .card{
    display:grid;
    grid-template-columns:520px 0px;
    gap:0px;
    max-width:520px; width:100%;
    align-items:start;
    transition:grid-template-columns .55s cubic-bezier(.4,0,.2,1),
               max-width .55s cubic-bezier(.4,0,.2,1),
               gap .55s cubic-bezier(.4,0,.2,1);
  }
  .card.has-result{
    grid-template-columns:460px 460px;
    gap:48px;
    max-width:968px;
  }
  .form-panel{ min-width:0; }
  .card h1{
    font-family:'Oswald',sans-serif; font-size:clamp(30px,4.5vw,42px);
    font-weight:600; margin-bottom:12px;
  }
  .card > p.sub, .form-panel > p.sub{
    color:var(--muted); font-size:14.5px; line-height:1.6; margin-bottom:28px;
  }

  .field{ margin-bottom:20px; }
  .field label{
    display:block; font-size:11.5px; font-weight:600; letter-spacing:.08em;
    color:var(--accent); text-transform:uppercase; margin-bottom:8px;
  }
  .field input{
    width:100%; padding:12px 2px; border:none; border-bottom:1px solid var(--line);
    background:transparent; color:var(--ink); font-size:16px; font-family:'Inter',sans-serif;
    outline:none;
  }
  .field input::placeholder{ color:var(--muted); opacity:.55; }
  .field input:focus{ border-color:var(--accent); }

  .submit-btn{
    width:100%; background:var(--ink); color:var(--bg);
    border:none; padding:14px; font-size:13.5px; font-weight:600;
    cursor:pointer; transition:background .3s ease; margin-top:8px;
  }
  .submit-btn:hover{ background:var(--accent); color:#fff; }
  .submit-btn:disabled{ opacity:.6; cursor:not-allowed; }

  .error-msg{
    display:none; margin-top:14px; font-size:13.5px; color:var(--accent);
    line-height:1.5;
  }

  .result{
    min-width:0; overflow:hidden;
    opacity:0;
    transform:translateX(12px);
    transition:opacity .4s ease .15s, transform .4s ease .15s;
  }
  .card.has-result .result{
    opacity:1;
    transform:translateX(0);
  }
  .clear-btn{
    display:inline-flex; align-items:center; gap:6px;
    font-size:12.5px; color:var(--muted); cursor:pointer;
    background:none; border:none; padding:0; margin-bottom:16px;
    font-family:'Inter',sans-serif;
  }
  .clear-btn:hover{ color:var(--accent); }
  .clear-btn svg{ width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:2; }
  .result-row{
    display:flex; align-items:center; justify-content:space-between;
    gap:12px; padding:9px 0; font-size:14px;
  }
  .result-row .mono{ font-size:11px; color:var(--muted); }
  .status-pill{
    font-size:11px; font-weight:600; letter-spacing:.04em;
    padding:4px 11px; border-radius:20px; text-transform:uppercase;
  }
  .status-pill.paid{ background:rgba(60,180,100,.15); color:#3cb464; }
  .status-pill.pending{ background:rgba(230,160,60,.15); color:#e6a03c; }
  .jersey-list{ display:flex; flex-direction:column; gap:10px; margin-top:14px; }
  .jersey-item{
    border:1px solid var(--line); padding:12px 14px; font-size:13px;
  }
  .jersey-item .mono{ color:var(--muted); font-size:10.5px; display:block; margin-bottom:3px; }

  @media (max-width:780px){
    .topbar{ padding:18px 20px; }
    .wrap{ padding:96px 6vw 40px; }
    .card{
      display:block; max-width:520px;
      transition:none;
    }
    .result{
      display:none;
      margin-top:28px; padding-top:24px;
      border-top:1px solid var(--line);
      opacity:1; transform:none;
    }
    .card.has-result .result{ display:block; }
    .topbar-menu{
      top:0; left:0; right:0; bottom:auto;
      width:100%; max-width:100%;
      border-left:none; border-bottom:1px solid var(--line);
      transform:none;
      max-height:0; padding:0 20px;
      overflow:hidden;
      transition:max-height .3s ease;
    }
    .topbar-menu.active{
      max-height:85vh; overflow-y:auto;
      padding:20px 20px 26px;
    }
  }
</style>
</head>

<div class="wrap">
  <div class="card" id="checkerCard">
    <div class="form-panel">
      <button class="back-link" id="backLink">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Back to home
      </button>
      <h1>Check your order</h1>
      <p class="sub">Enter the Order ID you received after checkout to see your order details and payment status.</p>

      <div class="field">
        <label>Order ID</label>
        <input type="text" id="orderIdInput" placeholder="e.g. ALI-1968-K3F" autocomplete="off">
      </div>

      <p class="error-msg" id="errorMsg">We couldn't find an order with that ID. Double check and try again.</p>

      <button class="submit-btn" id="submitBtn">Check order</button>
    </div>

    <div class="result" id="result">
      <button class="clear-btn" id="clearBtn">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Search a different order
      </button>
      <div id="resultContent"></div>
    </div>
  </div>
</div>

<script>
  /* ---------------- THEME TOGGLE (matches index.html) ---------------- */
  const root = document.documentElement;
  const themeToggle = document.getElementById('themeToggle');
  const savedTheme = localStorage.getItem('kit-theme');
  if(savedTheme){ root.setAttribute('data-theme', savedTheme); }
  themeToggle.addEventListener('click', () => {
    const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem('kit-theme', next);
  });

  document.getElementById('brandHome').addEventListener('click', () => { window.location.href = '/'; });
  document.getElementById('backLink').addEventListener('click', () => { window.location.href = '/'; });

  /* ---------------- MOBILE TOPBAR MENU (hamburger / slide-in drawer) ---------------- */
  const menuToggleBtn = document.getElementById('menuToggleBtn');
  const menuCloseBtn = document.getElementById('menuCloseBtn');
  const topbarMenu = document.getElementById('topbarMenu');
  const menuOverlay = document.getElementById('menuOverlay');

  function closeTopbarMenu(){
    topbarMenu.classList.remove('active');
    menuOverlay.classList.remove('active');
    menuToggleBtn.setAttribute('aria-expanded', 'false');
    document.body.style.overflow = '';
  }
  function toggleTopbarMenu(){
    const nowOpen = topbarMenu.classList.toggle('active');
    menuOverlay.classList.toggle('active', nowOpen);
    menuToggleBtn.setAttribute('aria-expanded', String(nowOpen));
    document.body.style.overflow = nowOpen ? 'hidden' : '';
  }

  menuToggleBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    toggleTopbarMenu();
  });
  menuCloseBtn.addEventListener('click', closeTopbarMenu);
  menuOverlay.addEventListener('click', closeTopbarMenu);
  topbarMenu.addEventListener('click', (e)=>{
    if(e.target.closest('.btn-mini')) closeTopbarMenu();
  });
  document.addEventListener('keydown', (e)=>{
    if(e.key === 'Escape') closeTopbarMenu();
  });
  // Already on the checker page, so this just closes the drawer and
  // focuses the field instead of reloading the page on itself.
  document.getElementById('checkOrderBtnTop').addEventListener('click', ()=>{
    closeTopbarMenu();
    setTimeout(()=> orderIdInput.focus(), 300);
  });

  /* ---------------- ORDER LOOKUP ----------------
     Same SCRIPT_URL / JSONP pattern as index.html. Expects the Apps
     Script's doGet() to accept an "orderId" query param and respond with:
       { found: true, order: {
           "Name": "...", "Order ID": "...",
           "Payment Status": "Paid" | "Pay Later" | "",
           "Jerseys": [ { Type, Number, Name, Size, Set }, ... ],
           Total: 140
         } }
     or { found: false } when no match exists. */
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbybJZrAIPleUv6BqVbuwk8oiDcuhGKUW1t2wjDwh2J0ZB4oSuYa2l-dY3t9N3WrXz_V/exec";

  function jsonpRequest(url, timeoutMs = 8000){
    return new Promise((resolve, reject) => {
      const cbName = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random()*100000);
      const script = document.createElement('script');
      const cleanup = () => { delete window[cbName]; script.remove(); };
      const timer = setTimeout(() => { cleanup(); reject(new Error('JSONP request timed out')); }, timeoutMs);
      window[cbName] = (data) => { clearTimeout(timer); cleanup(); resolve(data); };
      script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
      script.onerror = () => { clearTimeout(timer); cleanup(); reject(new Error('JSONP request failed')); };
      document.body.appendChild(script);
    });
  }

  const orderIdInput = document.getElementById('orderIdInput');
  const submitBtn = document.getElementById('submitBtn');
  const errorMsg = document.getElementById('errorMsg');
  const resultContentEl = document.getElementById('resultContent');
  const clearBtn = document.getElementById('clearBtn');

  function renderResult(order){
    const jerseys = Array.isArray(order.Jerseys) ? order.Jerseys : [];
    const total = (order.Total !== undefined && order.Total !== '') ? order.Total : '—';
    const statusRaw = (order['Payment Status'] || '').trim();
    const isPaid = statusRaw.toLowerCase() === 'paid';
    const statusLabel = statusRaw || 'Payment pending';

    const jerseyItems = jerseys.map(j => `
      <div class="jersey-item">
        <span class="mono">${(j.Type || '').toUpperCase()} · ${(j.Set || '').toUpperCase()}</span>
        No. ${j.Number || '—'} — ${j.Name || '—'} (${j.Size || '—'})
      </div>
    `).join('');

    resultContentEl.innerHTML = `
      <div class="result-row">
        <span class="mono">NAME</span>
        <span>${order.Name || '—'}</span>
      </div>
      <div class="result-row">
        <span class="mono">ORDER ID</span>
        <span class="mono">${order['Order ID'] || '—'}</span>
      </div>
      <div class="result-row">
        <span class="mono">STATUS</span>
        <span class="status-pill ${isPaid ? 'paid' : 'pending'}">${statusLabel}</span>
      </div>
      <div class="result-row">
        <span class="mono">TOTAL</span>
        <span>RM ${total}</span>
      </div>
      <div class="jersey-list">${jerseyItems}</div>
    `;
  }

  const checkerCard = document.getElementById('checkerCard');

  async function submitCheck(){
    const id = orderIdInput.value.trim();
    errorMsg.style.display = 'none';
    if(!id) return;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Checking...';

    try{
      const data = await jsonpRequest(SCRIPT_URL + '?orderId=' + encodeURIComponent(id));
      if(data && data.found && data.order){
        renderResult(data.order);
        checkerCard.classList.add('has-result');
      }else{
        checkerCard.classList.remove('has-result');
        errorMsg.textContent = "We couldn't find an order with that ID. Double check and try again.";
        errorMsg.style.display = 'block';
      }
    }catch(err){
      console.warn('Order lookup failed.', err);
      checkerCard.classList.remove('has-result');
      errorMsg.textContent = 'Something went wrong checking your order. Please try again.';
      errorMsg.style.display = 'block';
    }finally{
      submitBtn.disabled = false;
      submitBtn.textContent = 'Check order';
    }
  }

  // Lets someone search a different Order ID without reloading the page —
  // clears the input and current result, and collapses the layout back
  // to the single centered form so the slide-open animation can replay.
  clearBtn.addEventListener('click', () => {
    checkerCard.classList.remove('has-result');
    orderIdInput.value = '';
    errorMsg.style.display = 'none';
    orderIdInput.focus();
  });

  submitBtn.addEventListener('click', submitCheck);
  orderIdInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){ e.preventDefault(); submitCheck(); }
  });
  orderIdInput.focus();
</script>
